name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tracecase_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tracecase_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      APP_ENV: local
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tracecase_ci?schema=public
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_dummy
      CLERK_SECRET_KEY: sk_test_ci_dummy
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /dashboard
      INNGEST_DEV: "1"
      INNGEST_BASE_URL: http://127.0.0.1:8288

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check environment
        run: npm run check-env

      - name: Run migrations
        run: npm run db:migrate:ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Lint (if configured)
        run: npm run lint --if-present
